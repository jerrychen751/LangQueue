<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LangQueue Popup</title>
    <style>
      /* Minimal critical styles for instant preloader without Tailwind */
      html, body { height: 100%; margin: 0; }
      body { background: #f2f4f3; color: #1c272c; }
      .popup-size { width: 400px; min-width: 400px; max-width: 400px; height: 600px; }
      .center { display: flex; align-items: center; justify-content: center; }
      .column { flex-direction: column; }
      .brand { margin-top: 10px; color: #1c272c; font: 600 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: -0.01em; }
      .spinner { width: 28px; height: 28px; border-radius: 9999px; border: 3px solid #d5dcde; border-top-color: #527d8c; animation: spin 0.8s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
      .preloader { position: absolute; inset: 0; }
      .hidden { display: none !important; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <!-- Instant pre-React preloader -->
    <div id="preloader" class="preloader center popup-size center column">
      <div class="spinner" aria-label="Loading"></div>
      <div class="brand">LangQueue</div>
    </div>
    <script type="module" src="/src/popup/main.tsx"></script>
  </body>
  </html>
